<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coaching Company</title>
    <link rel="icon" type="image/svg+xml" href="./urban-building-company-city-apartment-svgrepo-com.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell page-shell--slide">
      <section class="hero hero--slide">
        <a id="adminLink" class="admin-link" href="./company-view.html" aria-label="Admin">
          <img
            src="./urban-building-company-city-apartment-svgrepo-com.svg"
            alt=""
            class="admin-link__icon"
            aria-hidden="true"
          />
        </a>
        <p class="eyebrow">AI-run coaching company</p>
        <h1 id="topTitle">合格まで、今日やることはもう決まっています。</h1>
        <p id="topCopy" class="hero-copy">今日の状態に合わせて、最初の1問から進めます。</p>
        <a id="startLink" class="refresh-button hero-button slide-link" href="./start.html">始める</a>
      </section>
    </main>
    <script type="module">
      import { mountLanguageToggle, t, withLang } from "./session.js";
      mountLanguageToggle();
      document.documentElement.lang = new URLSearchParams(window.location.search).get("lang") || "ja";
      document.getElementById("topTitle").textContent = t("topTitle");
      document.getElementById("topCopy").textContent = t("topCopy");
      document.getElementById("startLink").textContent = t("startButton");
      document.getElementById("startLink").href = withLang("./start.html");
      document.getElementById("adminLink").href = withLang("./company-view.html");
      document.getElementById("adminLink").title = t("adminEntry");
      document.getElementById("adminLink").setAttribute("aria-label", t("adminEntry"));
    </script>
  </body>
</html>
