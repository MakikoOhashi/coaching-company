<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Topic</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell page-shell--slide">
      <article class="slide-card">
        <p class="session-card__label">2. Topic</p>
        <h2 id="topicMessage" class="slide-title"></h2>
        <a id="topicNextLink" class="session-button slide-link" href="./question.html"></a>
      </article>
    </main>

    <script type="module">
      import { buildTopicMessage, getStore, loadQuestion, mergeStore, mountLanguageToggle, t, translateTexts, withLang, LANG } from "./session.js";

      mountLanguageToggle();
      document.documentElement.lang = new URLSearchParams(window.location.search).get("lang") || "ja";
      mergeStore({ stage: "topic" });
      const store = getStore();
      let question = store.currentQuestion;
      if (!question) {
        question = await loadQuestion();
      }

      const topicText = buildTopicMessage(question);
      const [translatedTopic] = LANG === "en" ? await translateTexts([topicText]) : [topicText];
      document.getElementById("topicMessage").textContent = translatedTopic;
      document.getElementById("topicNextLink").textContent = t("next");
      document.getElementById("topicNextLink").href = withLang("./question.html");
    </script>
  </body>
</html>
