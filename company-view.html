<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Company View</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell page-shell--slide">
      <section class="slide-card company-view company-view--ops">
        <p class="eyebrow">Company OS</p>
        <h1 id="companyViewTitle" class="slide-title"></h1>
        <p id="companyViewIntro" class="company-view__intro"></p>
        <div class="company-now">
          <p class="company-now__label" id="companyNowLabel"></p>
          <p class="company-now__body" id="companyNowLine"></p>
        </div>

        <div id="companyStatus" class="status-message">読み込み中です...</div>

        <div id="companyOps" class="company-ops" hidden>
          <div class="company-summary-strip">
            <span class="company-summary-chip"><span id="companyHealthStatusLabel"></span>: <strong id="companyHealthStatusValue"></strong></span>
            <span class="company-summary-chip"><span id="companyHealthActiveLabel"></span>: <strong id="companyHealthActiveValue"></strong></span>
            <span class="company-summary-chip"><span id="companyHealthEscalationLabel"></span>: <strong id="companyHealthEscalationValue"></strong></span>
          </div>

          <div class="company-grid">
            <section class="company-panel company-panel--wide company-panel--command">
              <h2 id="companyCommandTitle" class="company-panel__title"></h2>
              <div class="command-map">
                <div class="command-map__top">
                  <article class="command-node command-node--queue">
                    <p class="command-node__label" id="companyQueueTitle"></p>
                    <p class="command-node__value" id="companyQueueValue"></p>
                    <p class="command-node__meta" id="companyQueueMeta"></p>
                  </article>
                  <article class="command-node command-node--ceo">
                    <p class="command-node__label" id="companyLoopPolicyTitle"></p>
                    <p class="command-node__value" id="companyLoopPolicyBody"></p>
                    <p class="command-node__meta" id="companyLoopPolicyMeta"></p>
                    <p class="command-node__meta" id="companyLoopStatusValue"></p>
                  </article>
                </div>
                <div class="command-map__spine"></div>
                <div class="command-map__branches">
                  <article class="command-node">
                    <p class="command-node__label" id="coachALabel"></p>
                    <p class="command-node__value" id="coachAValue"></p>
                    <span class="command-node__badge" id="coachAStatus"></span>
                  </article>
                  <article class="command-node">
                    <p class="command-node__label" id="coachBLabel"></p>
                    <p class="command-node__value" id="coachBValue"></p>
                    <span class="command-node__badge" id="coachBStatus"></span>
                  </article>
                  <article class="command-node">
                    <p class="command-node__label" id="coachCLabel"></p>
                    <p class="command-node__value" id="coachCValue"></p>
                    <span class="command-node__badge" id="coachCStatus"></span>
                  </article>
                </div>
              </div>
            </section>

            <div class="company-column">
              <section class="company-panel company-panel--wide">
                <h2 id="companyHealthTitle" class="company-panel__title"></h2>
                <div class="company-overview">
                  <article class="company-metric company-metric--health">
                    <p class="company-metric__label" id="companyHealthRiskLabel"></p>
                    <p class="company-metric__value" id="companyHealthRiskValue"></p>
                  </article>
                  <article class="company-metric">
                    <p class="company-metric__label" id="companyDecisionKeepLabel"></p>
                    <p class="company-metric__value" id="companyDecisionKeepValue"></p>
                  </article>
                  <article class="company-metric">
                    <p class="company-metric__label" id="companyDecisionAdjustLabel"></p>
                    <p class="company-metric__value" id="companyDecisionAdjustValue"></p>
                  </article>
                  <article class="company-metric">
                    <p class="company-metric__label" id="companyDecisionEscalateLabel"></p>
                    <p class="company-metric__value" id="companyDecisionEscalateValue"></p>
                  </article>
                </div>
                <div class="company-trend">
                  <p class="company-trend__label" id="companyHealthTrendLabel"></p>
                  <div class="company-trend__list">
                    <span id="companyTrendRisk"></span>
                    <span id="companyTrendPass"></span>
                  </div>
                </div>
              </section>

              <section class="company-panel company-panel--wide">
                <h2 id="companyDecisionsTitle" class="company-panel__title"></h2>
                <div class="company-decisions">
                  <article class="company-decision-pill">
                    <p class="company-decision-pill__label" id="companyDecisionKeepSummaryLabel"></p>
                    <p class="company-decision-pill__value" id="companyDecisionKeepSummaryValue"></p>
                  </article>
                  <article class="company-decision-pill">
                    <p class="company-decision-pill__label" id="companyDecisionAdjustSummaryLabel"></p>
                    <p class="company-decision-pill__value" id="companyDecisionAdjustSummaryValue"></p>
                  </article>
                  <article class="company-decision-pill">
                    <p class="company-decision-pill__label" id="companyDecisionEscalateSummaryLabel"></p>
                    <p class="company-decision-pill__value" id="companyDecisionEscalateSummaryValue"></p>
                  </article>
                </div>
              </section>
            </div>
          </div>

          <section class="company-panel company-panel--wide">
            <h2 id="companyTransmissionTitle" class="company-panel__title"></h2>
            <div class="company-transmission">
              <article class="company-transmission__card">
                <p class="company-transmission__label" id="companyTransmissionDecisionLabel"></p>
                <p class="company-transmission__value" id="companyTransmissionDecisionValue"></p>
              </article>
              <article class="company-transmission__card">
                <p class="company-transmission__label" id="companyTransmissionOpsLabel"></p>
                <p class="company-transmission__value" id="companyTransmissionOpsValue"></p>
              </article>
              <article class="company-transmission__card">
                <p class="company-transmission__label" id="companyTransmissionInstructionLabel"></p>
                <p class="company-transmission__value" id="companyTransmissionInstructionValue"></p>
              </article>
            </div>
          </section>

          <section class="company-panel company-panel--wide company-panel--subtle">
            <h2 id="companyEscalationTitle" class="company-panel__title"></h2>
            <dl class="company-panel__list">
              <div class="company-panel__row">
                <dt id="companyEscalationCountLabel"></dt>
                <dd id="companyEscalationCountValue"></dd>
              </div>
              <div class="company-panel__row">
                <dt id="companyEscalationReasonLabel"></dt>
                <dd id="companyEscalationReasonValue"></dd>
              </div>
              <div class="company-panel__row">
                <dt id="companyEscalationStatusLabel"></dt>
                <dd id="companyEscalationStatusValue"></dd>
              </div>
            </dl>
          </section>
        </div>

        <div class="company-view__actions">
          <button id="companyRefresh" class="refresh-button" type="button"></button>
          <a id="companyBack" class="session-button slide-link" href="./start.html"></a>
        </div>
      </section>
    </main>

    <script type="module">
      import { mountLanguageToggle, t, withLang } from "./session.js";

      const SAMPLE_CASES = [
        {
          id: "A-102",
          coach: "A",
          risk: "high",
          decision: "keep_current_plan",
          queue: "daily",
          escalation: false,
        },
        {
          id: "B-087",
          coach: "A",
          risk: "medium",
          decision: "reduce_load",
          queue: "daily",
          escalation: false,
        },
        {
          id: "C-041",
          coach: "B",
          risk: "high",
          decision: "human_review",
          queue: "monthly",
          escalation: true,
        },
        {
          id: "D-019",
          coach: "B",
          risk: "low",
          decision: "increase_load",
          queue: "none",
          escalation: false,
        },
        {
          id: "E-008",
          coach: "C",
          risk: "medium",
          decision: "switch_subject",
          queue: "none",
          escalation: false,
        },
        {
          id: "F-116",
          coach: "C",
          risk: "low",
          decision: "keep_current_plan",
          queue: "none",
          escalation: false,
        },
      ];

      mountLanguageToggle();
      document.documentElement.lang = new URLSearchParams(window.location.search).get("lang") || "ja";

      const statusEl = document.getElementById("companyStatus");
      const opsEl = document.getElementById("companyOps");

      document.getElementById("companyViewTitle").textContent = t("companyViewTitle");
      document.getElementById("companyViewIntro").textContent = t("companyViewIntro");
      document.getElementById("companyNowLabel").textContent = t("companyNowLabel");
      document.getElementById("companyNowLine").textContent = t("companyNowLine");
      document.getElementById("companyCommandTitle").textContent = t("companyCommandTitle");
      document.getElementById("companyHealthTitle").textContent = t("companyHealthTitle");
      document.getElementById("companyDecisionsTitle").textContent = t("companyDecisionsTitle");
      document.getElementById("companyTransmissionTitle").textContent = t("companyTransmissionTitle");
      document.getElementById("companyEscalationTitle").textContent = t("companyEscalationTitle");

      document.getElementById("companyHealthStatusLabel").textContent = t("companyHealthStatus");
      document.getElementById("companyHealthActiveLabel").textContent = t("companyHealthActive");
      document.getElementById("companyHealthRiskLabel").textContent = t("companyHealthRisk");
      document.getElementById("companyHealthEscalationLabel").textContent = t("companyHealthEscalations");
      document.getElementById("companyHealthTrendLabel").textContent = t("companyHealthTrend");

      document.getElementById("companyDecisionKeepLabel").textContent = t("companyDecisionKeep");
      document.getElementById("companyDecisionAdjustLabel").textContent = t("companyDecisionAdjust");
      document.getElementById("companyDecisionEscalateLabel").textContent = t("companyDecisionEscalate");

      document.getElementById("companyDecisionKeepSummaryLabel").textContent = t("companyDecisionKeep");
      document.getElementById("companyDecisionAdjustSummaryLabel").textContent = t("companyDecisionAdjust");
      document.getElementById("companyDecisionEscalateSummaryLabel").textContent = t("companyDecisionEscalate");

      document.getElementById("companyQueueTitle").textContent = t("companyQueueTitle");
      document.getElementById("companyLoopPolicyTitle").textContent = t("companyLoopPolicyTitle");
      document.getElementById("companyLoopPolicyMeta").textContent = t("companyLoopPolicyMeta");
      document.getElementById("coachALabel").textContent = t("companyCoachALabel");
      document.getElementById("coachBLabel").textContent = t("companyCoachBLabel");
      document.getElementById("coachCLabel").textContent = t("companyCoachCLabel");

      document.getElementById("companyTransmissionDecisionLabel").textContent = t("companyTransmissionDecision");
      document.getElementById("companyTransmissionOpsLabel").textContent = t("companyTransmissionOps");
      document.getElementById("companyTransmissionInstructionLabel").textContent = t("companyTransmissionInstruction");

      document.getElementById("companyEscalationCountLabel").textContent = t("companyEscalationCount");
      document.getElementById("companyEscalationReasonLabel").textContent = t("companyEscalationReason");
      document.getElementById("companyEscalationStatusLabel").textContent = t("companyEscalationStatus");

      document.getElementById("companyRefresh").textContent = t("companyRefresh");
      document.getElementById("companyBack").textContent = t("companyBack");
      document.getElementById("companyBack").href = withLang("./start.html");

      function deriveCompanyOverview(sampleCases) {
        const activeCases = sampleCases.length;
        const highRisk = sampleCases.filter((item) => item.risk === "high").length;
        const escalations = sampleCases.filter((item) => item.escalation || item.decision === "human_review").length;
        const keepCount = sampleCases.filter((item) => item.decision === "keep_current_plan" || item.decision === "stay_course").length;
        const adjustCount = sampleCases.filter((item) => ["reduce_load", "increase_load", "switch_subject"].includes(item.decision)).length;
        const escalateCount = sampleCases.filter((item) => item.decision === "human_review").length;
        const healthStatus = escalations > 0 || highRisk >= 2 ? "WATCH" : "STABLE";
        const queueDaily = sampleCases.filter((item) => item.queue === "daily").length;
        const queueMonthly = sampleCases.filter((item) => item.queue === "monthly").length;
        const coaches = ["A", "B", "C"].map((coach) => {
          const coachCases = sampleCases.filter((item) => item.coach === coach);
          const escalated = coachCases.some((item) => item.escalation);
          const highLoad = coachCases.some((item) => item.risk === "high");
          let statusKey = "companyCoachApplied";
          if (escalated) statusKey = "companyCoachEscalated";
          else if (highLoad) statusKey = "companyCoachMonitoring";
          else if (coach === "C") statusKey = "companyCoachWaiting";
          return {
            coach,
            count: coachCases.length,
            statusKey,
          };
        });
        return { activeCases, highRisk, escalations, keepCount, adjustCount, escalateCount, healthStatus, queueDaily, queueMonthly, coaches };
      }

      function renderView(sampleCases) {
        const overview = deriveCompanyOverview(sampleCases);

        document.getElementById("companyHealthStatusValue").textContent =
          overview.healthStatus === "WATCH" ? t("companyHealthWatch") : t("companyHealthStable");
        document.getElementById("companyHealthActiveValue").textContent = String(overview.activeCases);
        document.getElementById("companyHealthRiskValue").textContent = String(overview.highRisk);
        document.getElementById("companyHealthEscalationValue").textContent = String(overview.escalations);
        document.getElementById("companyTrendRisk").textContent = t("companyTrendRiskUp");
        document.getElementById("companyTrendPass").textContent = t("companyTrendPassStable");

        document.getElementById("companyDecisionKeepValue").textContent = String(overview.keepCount);
        document.getElementById("companyDecisionAdjustValue").textContent = String(overview.adjustCount);
        document.getElementById("companyDecisionEscalateValue").textContent = String(overview.escalateCount);
        document.getElementById("companyDecisionKeepSummaryValue").textContent = String(overview.keepCount);
        document.getElementById("companyDecisionAdjustSummaryValue").textContent = String(overview.adjustCount);
        document.getElementById("companyDecisionEscalateSummaryValue").textContent = String(overview.escalateCount);

        document.getElementById("companyQueueValue").textContent = t("companyQueueValue", overview.queueDaily, overview.queueMonthly);
        document.getElementById("companyQueueMeta").textContent = t("companyQueueMeta");
        document.getElementById("companyLoopPolicyBody").textContent = t("companyFlowKeep");
        document.getElementById("companyLoopStatusValue").textContent = overview.escalations > 0 ? t("companyImproving") : t("companyStableLoop");

        overview.coaches.forEach((coach) => {
          document.getElementById(`coach${coach.coach}Value`).textContent = t("companyCoachCases", coach.count);
          const badge = document.getElementById(`coach${coach.coach}Status`);
          badge.textContent = t(coach.statusKey);
          badge.dataset.state = coach.statusKey;
        });

        document.getElementById("companyTransmissionDecisionValue").textContent = t("companyTransmissionDecisionValue");
        document.getElementById("companyTransmissionOpsValue").textContent = t("companyTransmissionOpsValue");
        document.getElementById("companyTransmissionInstructionValue").textContent = t("companyTransmissionInstructionValue");

        document.getElementById("companyEscalationCountValue").textContent = String(overview.escalations);
        document.getElementById("companyEscalationReasonValue").textContent =
          overview.escalations > 0 ? t("companyEscalationReasonValue") : t("companyFlowNoEscalation");
        document.getElementById("companyEscalationStatusValue").textContent =
          overview.escalations > 0 ? t("companyEscalationWaiting") : t("companyFlowNoEscalation");

        statusEl.hidden = true;
        opsEl.hidden = false;
      }

      async function refreshView() {
        statusEl.hidden = false;
        opsEl.hidden = true;
        statusEl.dataset.state = "";
        statusEl.textContent = t("loading");

        try {
          renderView(SAMPLE_CASES);
        } catch (error) {
          statusEl.hidden = false;
          statusEl.dataset.state = "error";
          statusEl.textContent = error.message || "Failed to load company view.";
        }
      }

      document.getElementById("companyRefresh").addEventListener("click", refreshView);
      refreshView();
    </script>
  </body>
</html>
