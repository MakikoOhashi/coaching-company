<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学習セッション開始</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell page-shell--slide">
      <section class="slide-card">
        <p id="coachLabel" class="coach-script__label"></p>
        <p id="coachScript" class="coach-script__body"></p>

        <section class="overview-panel">
          <p id="timePromptLabel" class="next-action__label"></p>
          <div class="stage-actions">
            <button id="timeShortButton" class="session-button session-button--ghost" type="button"></button>
            <button id="timeNormalButton" class="session-button session-button--ghost" type="button"></button>
            <button id="timeLongButton" class="session-button session-button--ghost" type="button"></button>
          </div>
          <article class="next-action">
            <p id="timeAdviceLabel" class="next-action__label"></p>
            <p id="timeAdviceBody" class="next-action__body">-</p>
          </article>
        </section>

        <div class="stage-actions">
          <button id="toggleOverviewButton" class="session-button session-button--ghost" type="button"></button>
          <a id="startYesLink" class="session-button slide-link" href="./intro.html"></a>
        </div>

        <section id="overviewPanel" class="overview-panel" hidden>
          <div class="state-grid">
            <article class="state-card">
              <p id="currentSubjectLabel" class="state-card__label"></p>
              <h3 id="currentSubject">-</h3>
            </article>
            <article class="state-card">
              <p id="currentMilestoneLabel" class="state-card__label"></p>
              <h3 id="currentMilestone">-</h3>
            </article>
            <article class="state-card">
              <p id="riskLevelLabel" class="state-card__label"></p>
              <h3 id="riskLevel">-</h3>
            </article>
            <article class="state-card">
              <p id="passProbabilityLabel" class="state-card__label"></p>
              <h3 id="passProbability">-</h3>
            </article>
          </div>
          <article class="next-action">
            <p id="nextActionLabel" class="next-action__label"></p>
            <p id="nextActionToday" class="next-action__body">-</p>
          </article>
        </section>
      </section>
    </main>

    <script type="module">
      import {
        buildCoachScript,
        buildTimeAdvice,
        deriveDailyQuota,
        getStore,
        loadStudentState,
        mergeStore,
        mountLanguageToggle,
        t,
        translateTexts,
        withLang,
        LANG,
      } from "./session.js";

      const coachScript = document.getElementById("coachScript");
      const overviewPanel = document.getElementById("overviewPanel");
      const toggleOverviewButton = document.getElementById("toggleOverviewButton");
      const startYesLink = document.getElementById("startYesLink");
      const setToggleText = () => {
        toggleOverviewButton.textContent = overviewPanel.hidden ? t("viewState") : t("hideState");
      };

      mountLanguageToggle();
      document.documentElement.lang = new URLSearchParams(window.location.search).get("lang") || "ja";
      document.getElementById("coachLabel").textContent = t("coachLabel");
      document.getElementById("currentSubjectLabel").textContent = t("currentTheme");
      document.getElementById("currentMilestoneLabel").textContent = t("currentMilestoneLabel");
      document.getElementById("riskLevelLabel").textContent = t("currentRisk");
      document.getElementById("passProbabilityLabel").textContent = t("passChance");
      document.getElementById("nextActionLabel").textContent = t("nextAction");
      document.getElementById("timePromptLabel").textContent = t("timePrompt");
      document.getElementById("timeAdviceLabel").textContent = t("timeAdviceLabel");
      document.getElementById("timeShortButton").textContent = t("timeShort");
      document.getElementById("timeNormalButton").textContent = t("timeNormal");
      document.getElementById("timeLongButton").textContent = t("timeLong");
      startYesLink.textContent = t("yes");
      startYesLink.href = withLang("./intro.html");

      overviewPanel.hidden = true;
      setToggleText();

      toggleOverviewButton.addEventListener("click", () => {
        overviewPanel.hidden = !overviewPanel.hidden;
        setToggleText();
      });

      const payload = (await loadStudentState()) || getStore();
      const { studentState, signals } = payload;
      mergeStore({ stage: "start", completedCount: 0 });

      async function renderStart() {
        const store = getStore();
        const dailyQuota = deriveDailyQuota(studentState, signals, store);
        mergeStore({ dailyQuota });

        const dynamicTexts = [
          buildCoachScript(studentState, dailyQuota),
          buildTimeAdvice(studentState, dailyQuota),
          studentState.currentSubject,
          studentState.currentMilestone,
          studentState.riskLevel,
          dailyQuota?.nextActionToday || studentState.nextActionToday,
        ];
        const [coachText, timeAdviceText, subjectText, milestoneText, riskText, nextActionText] =
          LANG === "en" ? await translateTexts(dynamicTexts) : dynamicTexts;

        coachScript.textContent = coachText;
        document.getElementById("timeAdviceBody").textContent = timeAdviceText;
        document.getElementById("currentSubject").textContent = subjectText;
        document.getElementById("currentMilestone").textContent = milestoneText;
        document.getElementById("riskLevel").textContent = riskText;
        document.getElementById("passProbability").textContent = `${studentState.passProbability}%`;
        document.getElementById("nextActionToday").textContent = nextActionText;
      }

      function bindTimeButton(id, value) {
        document.getElementById(id).addEventListener("click", async () => {
          mergeStore({ availableTime: value });
          await renderStart();
        });
      }

      bindTimeButton("timeShortButton", "short");
      bindTimeButton("timeNormalButton", "normal");
      bindTimeButton("timeLongButton", "long");

      await renderStart();
    </script>
  </body>
</html>
