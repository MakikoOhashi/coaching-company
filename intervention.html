<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coach</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell page-shell--slide">
      <article class="slide-card">
        <h2 id="interventionTitle" class="slide-title"></h2>
        <div id="questionRecall" class="question-recall" hidden>
          <p id="questionRecallLabel" class="question-recall__label"></p>
          <p id="questionRecallStem" class="question-recall__stem"></p>
          <p id="questionRecallChoice" class="question-recall__choice"></p>
        </div>
        <div id="resultFeedback" class="answer-feedback"></div>
        <div id="reflectionThread" class="reflection-thread"></div>

        <form id="reflectionForm" class="reflection-form">
          <label id="reflectionLabel" class="reflection-form__label" for="reflectionInput"></label>
          <input id="reflectionInput" class="reflection-form__input" type="text" autocomplete="off" />
          <button id="reflectionSubmit" class="session-button" type="submit"></button>
        </form>

        <div id="postReflectionActions" class="stage-actions" hidden>
          <button id="continueReflectionButton" class="session-button session-button--ghost" type="button"></button>
          <a id="nextLink" class="session-button slide-link" href="./summary.html"></a>
        </div>
      </article>
    </main>

    <script type="module">
      import {
        buildInitialReflectionPrompt,
        buildSummaryText,
        getStore,
        LANG,
        mergeStore,
        mountLanguageToggle,
        requestReflection,
        t,
        translateTexts,
        withLang,
      } from "./session.js";

      const store = getStore();
      const question = store.currentQuestion;
      const result = store.lastResult;
      const studentState = store.studentState;
      const selectedChoice = store.selectedChoice;
      if (!question || !result || !studentState) {
        window.location.href = "./question.html";
      }

      mountLanguageToggle();
      document.documentElement.lang = new URLSearchParams(window.location.search).get("lang") || "ja";
      mergeStore({ stage: "coach" });

      const reflectionThread = document.getElementById("reflectionThread");
      const reflectionForm = document.getElementById("reflectionForm");
      const reflectionLabel = document.getElementById("reflectionLabel");
      const reflectionInput = document.getElementById("reflectionInput");
      const reflectionSubmit = document.getElementById("reflectionSubmit");
      const postReflectionActions = document.getElementById("postReflectionActions");
      const continueReflectionButton = document.getElementById("continueReflectionButton");
      const nextLink = document.getElementById("nextLink");
      const resultFeedback = document.getElementById("resultFeedback");
      const questionRecall = document.getElementById("questionRecall");
      const questionRecallStem = document.getElementById("questionRecallStem");
      const questionRecallChoice = document.getElementById("questionRecallChoice");
      document.getElementById("interventionTitle").textContent = t("interventionTitle");
      document.getElementById("questionRecallLabel").textContent = t("currentQuestion");
      reflectionSubmit.textContent = t("submit");
      continueReflectionButton.textContent = t("continueChat");
      nextLink.textContent = t("proceedNext");
      nextLink.href = withLang("./summary.html");

      const initialPrompt = buildInitialReflectionPrompt(result);
      let resultText = result.isCorrect ? `正解です。${result.explanation}` : `正解は ${result.correct} です。${result.explanation}`;
      let recallStemText = question?.stem || "";
      let recallChoiceText = selectedChoice ? `あなたの回答: ${selectedChoice}. ${question.choices[selectedChoice - 1] || ""}` : "";
      let coachPromptText = initialPrompt;

      if (LANG === "en") {
        const translated = await translateTexts([resultText, recallStemText, recallChoiceText, coachPromptText]);
        [resultText, recallStemText, recallChoiceText, coachPromptText] = translated;
      }

      resultFeedback.dataset.result = result.isCorrect ? "correct" : "incorrect";
      resultFeedback.textContent = resultText;

      if (question?.stem && selectedChoice) {
        questionRecall.hidden = false;
        questionRecallStem.textContent = recallStemText;
        questionRecallChoice.textContent = recallChoiceText;
      }
      let coachTurn = 1;
      let currentMode = result.isCorrect ? "correct_check" : "mistake_review";

      reflectionThread.innerHTML = `<div class="reflection-bubble" data-role="coach">${coachPromptText}</div>`;
      reflectionLabel.textContent = result.isCorrect ? t("explainBriefly") : t("mistakePrompt");
      reflectionInput.placeholder = result.isCorrect
        ? LANG === "en"
          ? "Example: ◎◎ means a right recognized for △△"
          : "例: ◎◎とは、△△のために認められる権利"
        : LANG === "en"
          ? "Example: I misunderstood that it also applied to ◎◎ / I thought ◎◎ was the exception"
          : "例: ◎◎まで対象になると勘違いした / ◎◎が特則だと思っていた";

      continueReflectionButton.addEventListener("click", () => {
        currentMode = "follow_up";
        reflectionForm.hidden = false;
        postReflectionActions.hidden = true;
        reflectionInput.disabled = false;
        reflectionSubmit.disabled = false;
        reflectionInput.value = "";
        reflectionLabel.textContent = LANG === "en" ? "You can continue asking about this point" : "この論点について続けて聞けます";
        reflectionInput.placeholder = LANG === "en"
          ? "Example: What does statutory lien mean? / Is there an exception in this question?"
          : "例: 先取特権の意味を教えてください / この問題の特則はありますか？";
        reflectionInput.focus();
      });

      reflectionForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const learnerReflection = reflectionInput.value.trim();
        if (!learnerReflection) return;

        reflectionThread.insertAdjacentHTML("beforeend", `<div class="reflection-bubble" data-role="user">${learnerReflection}</div>`);
        const payload = await requestReflection({
          questionText: question.stem,
          explanationText: result.explanation,
          learnerReflection,
          coachTurn,
          mode: currentMode,
        });

        const coachMessage = LANG === "en" ? (await translateTexts([payload.coachMessage]))[0] : payload.coachMessage;
        reflectionThread.insertAdjacentHTML("beforeend", `<div class="reflection-bubble" data-role="coach">${coachMessage}</div>`);
        const summaryBase = buildSummaryText(studentState, payload.coachMessage);
        const summaryText = LANG === "en" ? (await translateTexts([summaryBase]))[0] : summaryBase;
        mergeStore({
          summaryText,
          stage: "summary",
        });

        reflectionInput.disabled = true;
        reflectionSubmit.disabled = true;
        coachTurn = Math.min(3, coachTurn + 1);

        reflectionForm.hidden = true;
        postReflectionActions.hidden = false;
      });
    </script>
  </body>
</html>
