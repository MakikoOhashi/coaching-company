<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Question</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell page-shell--slide">
      <article class="slide-card">
        <p class="session-card__label">4. Question</p>
        <h2 id="questionTopic" class="slide-title">読み込み中です...</h2>
        <p id="questionStem" class="question-stem"></p>
        <div id="choiceList" class="choice-list"></div>
        <button id="answerButton" class="session-button" type="button">回答する</button>
      </article>
    </main>

    <script type="module">
      import { buildQuestionTopic, getStore, loadQuestion, mergeStore, mountLanguageToggle, submitAnswer, t } from "./session.js";

      mountLanguageToggle();
      document.documentElement.lang = new URLSearchParams(window.location.search).get("lang") || "ja";
      mergeStore({ stage: "question" });
      const store = getStore();
      let question = store.currentQuestion;
      if (!question) {
        question = await loadQuestion();
      }

      let selectedChoice = null;
      document.getElementById("questionTopic").textContent = buildQuestionTopic(question);
      document.getElementById("questionStem").textContent = question.stem;

      const choiceList = document.getElementById("choiceList");
      question.choices.forEach((choiceText, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice-button";
        button.textContent = `${index + 1}. ${choiceText}`;
        button.addEventListener("click", () => {
          selectedChoice = index + 1;
          [...choiceList.querySelectorAll(".choice-button")].forEach((node, nodeIndex) => {
            node.dataset.selected = nodeIndex === index ? "true" : "false";
          });
        });
        choiceList.appendChild(button);
      });

      document.getElementById("answerButton").textContent = t("answer");
      document.getElementById("answerButton").addEventListener("click", async () => {
        if (!selectedChoice) return;
        const payload = await submitAnswer(question.id, selectedChoice);
        mergeStore({
          currentQuestion: question,
          lastResult: payload.result,
          selectedChoice,
          studentState: payload.studentState,
          signals: payload.signals,
          stage: "coach",
        });
        window.location.href = "./intervention.html";
      });
    </script>
  </body>
</html>
