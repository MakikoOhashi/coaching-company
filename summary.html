<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session Summary</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell page-shell--slide">
      <article class="slide-card">
        <p class="session-card__label">6. Summary</p>
        <h2 id="summaryTitle" class="slide-title">Close the session</h2>
        <p id="summaryText" class="session-card__body">読み込み中です...</p>
        <p id="countdownText" class="question-intro">15秒後に次の問題へ進みます。</p>
        <a id="skipAheadLink" class="session-button slide-link" href="./question.html">すぐ進む</a>
      </article>
    </main>

    <script type="module">
      import { getStore, mergeStore, mountLanguageToggle, t, withLang } from "./session.js";

      mountLanguageToggle();
      document.documentElement.lang = new URLSearchParams(window.location.search).get("lang") || "ja";
      const store = getStore();
      const summaryText = store.summaryText || "ここまでで次へ進めます。次の問題に進みましょう。";
      document.getElementById("summaryText").textContent = summaryText;
      mergeStore({ stage: "summary" });
      const countdownText = document.getElementById("countdownText");
      const skipAheadLink = document.getElementById("skipAheadLink");
      let remainingSeconds = 15;

      document.getElementById("summaryTitle").textContent = t("closeSession");
      skipAheadLink.textContent = t("skipAhead");
      skipAheadLink.href = withLang("./question.html");
      countdownText.textContent = t("autoAdvance", remainingSeconds);

      const countdownTimer = window.setInterval(() => {
        remainingSeconds -= 1;
        if (remainingSeconds <= 0) {
          window.clearInterval(countdownTimer);
          return;
        }
        countdownText.textContent = t("autoAdvance", remainingSeconds);
      }, 1000);

      window.setTimeout(() => {
        window.clearInterval(countdownTimer);
        window.location.href = withLang("./question.html");
      }, 15000);
    </script>
  </body>
</html>
