<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session Summary</title>
    <link rel="icon" type="image/svg+xml" href="./urban-building-company-city-apartment-svgrepo-com.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell page-shell--slide">
      <article class="slide-card">
        <h2 id="summaryTitle" class="slide-title"></h2>
        <p id="summaryText" class="session-card__body"></p>
        <p id="countdownText" class="question-intro"></p>
        <a id="skipAheadLink" class="session-button slide-link" href="./question.html"></a>
      </article>
    </main>

    <script type="module">
      import { getNextStageHref, getStore, mergeStore, mountLanguageToggle, t, translateTexts, LANG } from "./session.js";

      mountLanguageToggle();
      document.documentElement.lang = new URLSearchParams(window.location.search).get("lang") || "ja";
      const store = getStore();
      const summaryText = store.summaryText || "ここまでで次へ進めます。次の問題に進みましょう。";
      const [translatedSummary] = LANG === "en" ? await translateTexts([summaryText]) : [summaryText];
      document.getElementById("summaryText").textContent = translatedSummary;
      mergeStore({ stage: "summary" });
      const countdownText = document.getElementById("countdownText");
      const skipAheadLink = document.getElementById("skipAheadLink");
      const nextHref = getNextStageHref(store);
      let remainingSeconds = 15;

      document.getElementById("summaryTitle").textContent = t("closeSession");
      skipAheadLink.textContent = t("skipAhead");
      skipAheadLink.href = nextHref;
      countdownText.textContent = t("autoAdvance", remainingSeconds);

      const countdownTimer = window.setInterval(() => {
        remainingSeconds -= 1;
        if (remainingSeconds <= 0) {
          window.clearInterval(countdownTimer);
          return;
        }
        countdownText.textContent = t("autoAdvance", remainingSeconds);
      }, 1000);

      window.setTimeout(() => {
        window.clearInterval(countdownTimer);
        window.location.href = nextHref;
      }, 15000);
    </script>
  </body>
</html>
