<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session Intro</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell page-shell--slide">
      <article class="slide-card">
        <p class="session-card__label">1. Session intro</p>
        <h2 id="introTitle" class="slide-title">読み込み中です...</h2>
        <a id="introNextLink" class="session-button slide-link" href="./topic.html">次へ</a>
      </article>
    </main>
    <script type="module">
      import { buildSessionIntro, getStore, loadStudentState, mergeStore, mountLanguageToggle, t, withLang } from "./session.js";
      mountLanguageToggle();
      document.documentElement.lang = new URLSearchParams(window.location.search).get("lang") || "ja";
      const stored = getStore();
      let studentState = stored.studentState;
      let signals = stored.signals;
      let dailyQuota = stored.dailyQuota;

      if (!studentState || !signals || !dailyQuota) {
        const payload = await loadStudentState();
        studentState = payload.studentState;
        signals = payload.signals;
        dailyQuota = payload.dailyQuota;
      }

      document.getElementById("introTitle").textContent = buildSessionIntro(studentState, signals, dailyQuota);
      document.getElementById("introNextLink").textContent = t("next");
      document.getElementById("introNextLink").href = withLang("./topic.html");
      mergeStore({ stage: "intro" });
    </script>
  </body>
</html>
